name: Android CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GRADLE_OPTS: -Dorg.gradle.daemon=false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check gradlew exists
        id: gradlew
        shell: bash
        run: |
          if [ -f "./gradlew" ]; then
            echo "has_gradlew=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_gradlew=false" >> "$GITHUB_OUTPUT"
            echo "No ./gradlew found. Android project not initialized yet; skipping Gradle steps."
          fi

      - name: Set up JDK
        if: steps.gradlew.outputs.has_gradlew == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        if: steps.gradlew.outputs.has_gradlew == 'true'
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        if: steps.gradlew.outputs.has_gradlew == 'true'
        shell: bash
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Gradle cache
        if: steps.gradlew.outputs.has_gradlew == 'true'
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Ensure gradlew is executable
        if: steps.gradlew.outputs.has_gradlew == 'true'
        shell: bash
        run: chmod +x ./gradlew

      - name: Gradle test
        if: steps.gradlew.outputs.has_gradlew == 'true'
        run: ./gradlew test --no-daemon

      - name: Gradle lint
        if: steps.gradlew.outputs.has_gradlew == 'true'
        run: ./gradlew lint --no-daemon

      - name: Assemble debug
        if: steps.gradlew.outputs.has_gradlew == 'true'
        run: ./gradlew assembleDebug --no-daemon

